steps:
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: 'bash'
    args:
    - -euc
    - |
      # Fetch the consolidated JSON cert bundle and split into the three PEM files the docker
      # context step expects (written to /workspace, shared across build steps). The gcloud build
      # image has python3 but not jq, and gcloud cannot project a field out of a JSON secret value.
      set -o pipefail
      gcloud secrets versions access latest --secret oracle-sanjose-arm-docker-certs | python3 -c '
      import json, sys
      bundle = json.load(sys.stdin)
      for key, fname in (("ca", "ca.pem"), ("cert", "cert.pem"), ("key", "key.pem")): open(fname, "w").write(bundle[key])
      '
      test -s ca.pem
      test -s cert.pem
      test -s key.pem
  - name: 'docker'
    args: ['context', 'create', '--docker', 'host=tcp://192.9.137.182:2376,ca=ca.pem,cert=cert.pem,key=key.pem', 'oracle-sanjose-arm']
    id: 'create-context'
  - name: 'docker'
    env:
    - 'DOCKER_API_VERSION=1.41'
    args: ['buildx', 'create', '--name', 'multi-builder', '--use', 'oracle-sanjose-arm']
    id: 'init-builder-remote'
  - name: 'docker'
    env:
    - 'DOCKER_API_VERSION=1.41'
    args: ['buildx', 'create', '--name', 'multi-builder', '--append', 'default']
    id: 'append-builder-local'
  - name: 'docker'
    env:
    - 'DOCKER_API_VERSION=1.41'
    args:
    - 'buildx'
    - 'build'
    - '--platform=$_DOCKER_BUILDX_PLATFORMS'
    - '--tag=us-docker.pkg.dev/$PROJECT_ID/email/$REPO_NAME:$BRANCH_NAME'
    - '--build-arg=${_PREBUILT_SERVER_TAG}'
    - '--file=$_DOCKER_FILE'
    - '--push'
    - '.'
    id: 'build-multi-architecture-container-image'
  - name: 'docker'
    env:
    - 'DOCKER_API_VERSION=1.41'
    args: ['buildx', 'rm', 'multi-builder']
    id: 'clean-up-builder'
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: 'bash'
    args: ['-c', 'rm -rf ca.pem cert.pem key.pem']
options:
  env:
    - 'DOCKER_CLI_EXPERIMENTAL=enabled'
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _DOCKER_BUILDX_PLATFORMS: 'linux/amd64,linux/arm64' # 'linux/amd64,linux/arm64' - Note slowness
  _DOCKER_FILE: 'Dockerfile'
  _PREBUILT_SERVER_TAG: 'PREBUILT_SERVER_TAG=main'
